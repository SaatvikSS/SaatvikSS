name: GitHub Metrics

on:
  # Refresh every 5 hours
  schedule:
    - cron: "0 */5 * * *"

  # Manual refresh
  workflow_dispatch:

  # Update when your profile repo changes
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest

        with:
          token: ${{ secrets.METRICS_TOKEN }}

          ####################################
          # User
          ####################################
          user: SaatvikSS
          filename: github-metrics.svg

          ####################################
          # Layout
          ####################################
          template: classic

          base: header, activity, repositories, metadata, community
          base_indepth: yes

          ####################################
          # Repository Discovery
          ####################################
          repositories_batch: 100
          repositories_affiliations: owner, collaborator, organization_member
          repositories_forks: yes

          ####################################
          # Display
          ####################################
          config_display: large
          config_padding: 0
          config_timezone: Asia/Kolkata
          config_animations: yes

          ####################################
          # Introduction
          ####################################
          plugin_introduction: yes
          plugin_introduction_title: no

          ####################################
          # Languages
          ####################################
          plugin_languages: yes
          plugin_languages_limit: 10
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 60
          plugin_languages_analysis_timeout_repositories: 30
          plugin_languages_recent_categories: programming, markup
          plugin_languages_recent_load: 1000
          plugin_languages_recent_days: 730

          ####################################
          # Lines Changed
          ####################################
          plugin_lines: yes
          plugin_lines_sections: base
          plugin_lines_repositories_limit: 1000
          plugin_lines_history_limit: 10

          ####################################
          # Pull Requests
          ####################################
          plugin_followup: yes
          plugin_followup_sections: repositories
          plugin_followup_indepth: yes

          ####################################
          # Contribution Calendar
          ####################################
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          ####################################
          # Featured Repositories
          ####################################
          plugin_repositories: yes
          plugin_repositories_featured: >
            SaatvikSS/Qryptics,
            SaatvikSS/Tattva,
            SaatvikSS/GreenRoute

          ####################################
          # Stars
          ####################################
          plugin_stars: yes
          plugin_stars_limit: 4

          ####################################
          # Topics
          ####################################
          plugin_topics: yes
          plugin_topics_limit: 20

          ####################################
          # Continue if a plugin fails
          ####################################
          plugins_errors_fatal: no
